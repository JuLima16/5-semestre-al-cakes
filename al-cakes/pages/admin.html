<!DOCTYPE html>
<!-- A&L Cakes - Painel admin: cadastro de produto (somente visual) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Cadastrar Produto - A&L Cakes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <img src="../images/teste.png" alt="" style="width: 4.5%; border-radius: 50%;">
      <a href="../index.html" class="logo">A&L<span> Cakes</span></a>
      <button class="hamburguer" aria-label="Abrir menu"><span></span><span></span><span></span></button>
      <nav>
        <ul class="nav-menu">
          <li><a href="../index.html">Início</a></li>
          <li><a href="cardapio.html">Cardápio</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="admin.html">Admin</a></li>
          <li><a href="login.html" class="btn-login">Entrar</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="form-container largo">
      <h2>Painel Administrativo</h2>
      <p class="subtitulo">Cadastre um novo produto</p>

      <form id="form-admin" novalidate>
        <div class="campo">
          <label for="nome">Nome do produto</label>
          <input type="text" id="nome" name="nome" placeholder="Ex: Bolo de cenoura" required />
        </div>
        <div class="campo">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" placeholder="Descreva o produto..." required></textarea>
        </div>
        <div class="campo">
          <label for="preco">Preço (R$)</label>
          <input type="number" id="preco" name="preco" step="0.01" min="0" placeholder="49.90" required />
        </div>
        <div class="campo">
          <label for="imagem">URL da imagem</label>
          <input type="url" id="imagem" name="imagem" placeholder="https://..." />
        </div>
        <button type="submit" class="btn">Cadastrar Produto</button>
      </form>

      <!-- Pré-visualização preenchida pelo JS -->
      <div id="preview-produto" class="preview-produto"></div>
    </div>
  </main>

  <footer class="rodape">

    <div class="copyright">
      © 2026 A&L Cakes. Todos os direitos reservados. Projeto acadêmico.
    </div>
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
