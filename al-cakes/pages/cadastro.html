<!DOCTYPE html>
<!-- A&L Cakes - Cadastro de Cliente (formulário com validação JS) -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - A&L Cakes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <img src="../images/teste.png" alt="" style="width: 4.5%; border-radius: 50%;">
      <a href="../index.html" class="logo">A&L<span> Cakes</span></a>
      <button class="hamburguer" aria-label="Abrir menu"><span></span><span></span><span></span></button>
      <nav>
        <ul class="nav-menu">

          <li><a href="../index.html">Início</a></li>
          <li><a href="cardapio.html">Cardápio</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="sobre.html">Sobre</a></li>

          <li>
            <a href="login.html" class="btn-login">
              Entrar
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="form-container">
      <h2>Crie sua conta</h2>
      <p class="subtitulo">É rápido e fácil, comece a saborear ✨</p>

      <form id="form-cadastro" novalidate>
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" required />
        </div>
        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required />
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required />
        </div>
        <button type="submit" class="btn">Cadastrar</button>
      </form>

      <p class="link-extra">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>

  <footer class="rodape">

    <div class="copyright">
      © 2026 A&L Cakes. Todos os direitos reservados. Projeto acadêmico.
    </div>
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
